name: Update Bounty Board

on:
  schedule:
    # Run every hour at 7 minutes past the hour
    - cron: '7 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'check_cleared_bounties.py'
      - 'fetch_calunga_prs.py'
      - 'bounty-board.txt'
      - 'datasets/**'

permissions:
  contents: write

jobs:
  update-bounties:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # - name: Fetch Calunga PR data
      #   env:
      #     GITHUB_TOKEN: ${{ github.token }}
      #   run: |
      #     python fetch_calunga_prs.py

      - name: Check for cleared bounties
        run: |
          python check_cleared_bounties.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bounty-board.txt cleared-bounties.log calunga-index-prs.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update bounty board - $(date +'%Y-%m-%d')"
            git push
          fi
